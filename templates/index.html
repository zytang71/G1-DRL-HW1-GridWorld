<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GridWorld 1-1 / 1-2 / 1-3</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <main class="container">
      <h1>GridWorld 地圖建立、策略評估與訓練（1-1 / 1-2 / 1-3）</h1>

      <section class="controls">
        <div class="row">
          <label for="grid-size">地圖大小 n（5~9）</label>
          <input id="grid-size" type="number" min="5" max="9" value="5" />
          <button id="build-grid-btn" type="button">建立網格</button>
        </div>

        <div class="row mode-row">
          <span>點擊模式：</span>
          <label><input type="radio" name="mode" value="start" checked /> 起點</label>
          <label><input type="radio" name="mode" value="end" /> 終點</label>
          <label><input type="radio" name="mode" value="obstacle" /> 障礙物</label>
        </div>

        <div class="row">
          <button id="reset-btn" type="button">重置目前地圖</button>
          <button id="validate-btn" type="button">檢查是否符合條件</button>
        </div>

        <hr />

        <div class="row">
          <button id="generate-policy-btn" type="button">產生隨機策略（1-2）</button>
          <button id="evaluate-policy-btn" type="button">策略評估（1-2）</button>
          <button id="train-policy-btn" type="button">開始訓練（1-3）</button>
          <button id="replay-path-btn" type="button">重播路徑動畫</button>
        </div>

        <div class="row">
          <label for="gamma-input">gamma</label>
          <input id="gamma-input" type="number" min="0" max="1" step="0.01" value="0.9" />
          <label for="theta-input">theta</label>
          <input id="theta-input" type="number" min="0.000001" step="0.0001" value="0.0001" />
          <label for="max-iter-input">max iterations</label>
          <input id="max-iter-input" type="number" min="1" step="1" value="1000" />
        </div>

        <div class="row">
          <label for="step-reward-input">step reward</label>
          <input id="step-reward-input" type="number" step="0.1" value="-1" />
          <label for="goal-reward-input">goal reward</label>
          <input id="goal-reward-input" type="number" step="0.1" value="10" />
          <label for="max-policy-iter-input">max policy iter</label>
          <input id="max-policy-iter-input" type="number" min="1" step="1" value="200" />
          <button id="reset-params-btn" type="button">重設參數</button>
        </div>
      </section>

      <section class="status">
        <p id="status-line">請先建立網格，然後設定起點、終點與障礙物。</p>
      </section>

      <section class="hint-panel">
        <h2>提示區</h2>
        <p id="hint-line" class="hint-line">可先做 1-2（隨機策略+評估），再做 1-3（加入 reward 訓練）。</p>
        <p class="hint-item">1-2 固定獎勵：每步 -1，進入終點 0。</p>
        <p class="hint-item">1-3 會以上一步策略為初始策略，並於訓練後標記最佳路徑。</p>
      </section>

      <section class="grid-wrapper">
        <div id="grid" class="grid" aria-label="grid-map"></div>
      </section>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
